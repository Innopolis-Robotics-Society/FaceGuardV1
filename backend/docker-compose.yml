services:
  faceguard-agent:
    build: .
    container_name: faceguard-agent
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8081:8081"
    volumes:
      - ./data:/app/data
    # Linux/Raspberry Pi only. Remove this section when no /dev/video0 exists.
    devices:
      - /dev/video0:/dev/video0
