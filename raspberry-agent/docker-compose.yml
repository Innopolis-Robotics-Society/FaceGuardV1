services:
  face-recognition:
    build: .
    container_name: face-recognition-app

    devices:
      - "/dev/video0:/dev/video0"

    volumes:
      - ./faces:/app/faces
      - ./face_model.yml:/app/face_model.yml
      - ./labels.json:/app/labels.json
      - ./logs:/app/logs

    environment:
      - DISPLAY=${DISPLAY}

    network_mode: host