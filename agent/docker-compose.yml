version: '3.9'

services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: faceguard-agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - HARDWARE_MODE=raspberry_pi
      - DATA_DIR=/data
    volumes:
      - agent-data:/data
      - /dev/video0:/dev/video0  # Camera device (USB cameras)
      - /dev/vchiq:/dev/vchiq     # Raspberry Pi camera interface
    devices:
      - /dev/video0:/dev/video0   # USB camera
      - /dev/vchiq:/dev/vchiq     # Pi Camera Module
      - /dev/gpiomem:/dev/gpiomem # GPIO memory access
    privileged: false  # Try without privileged first for security
    # If camera or GPIO doesn't work, set to true:
    # privileged: true
    ports:
      - "8001:8001"  # Stream server port (required for camera feed)
    network_mode: bridge  # Use bridge mode with explicit ports
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Access host services (backend)

volumes:
  agent-data:
    driver: local
