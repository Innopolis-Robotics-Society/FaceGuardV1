version: '3.9'

services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: faceguard-agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - HARDWARE_MODE=raspberry_pi
      - DATA_DIR=/data
    volumes:
      - agent-data:/data
      - /dev/video0:/dev/video0  # Camera device
      - /dev/gpiomem:/dev/gpiomem  # GPIO access
    devices:
      - /dev/video0:/dev/video0
      - /dev/gpiomem:/dev/gpiomem
    privileged: true  # Required for GPIO and camera
    network_mode: host  # Use host network to access backend on same machine or local network
    ports:
      - "8001:8001"  # Stream server port

volumes:
  agent-data:
    driver: local
