version: '3.8'

services:
  # Frontend Web Application
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # API будет на хосте (не в Docker)
        VITE_API_URL: http://localhost:8000/api/v1
        VITE_WS_URL: ws://localhost:8000
    container_name: faceguard-frontend
    restart: unless-stopped
    ports:
      - "3000:80"  # Frontend будет доступен на порту 3000
    network_mode: "host"  # Используем host network для доступа к localhost:8000
